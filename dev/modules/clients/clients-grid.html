<div class="clients-grid">

  <div class="logos grid">
    <a class="item" target="_blank"
      ng-repeat="client in clients | limitTo: limit"
      ng-href="{{client.url}}" >
      <img
        lazy="{{client.logo}}"
        alt="{{client.name}}" >
      <h2 class="hidden"
        ng-if="!limit">{{client.name}}</h2>
      <h3 class="hidden"
        ng-if="limit">{{client.name}}</h3>
    </a>
  </div>

</div>
