<div id="home">

  <div class="our-stuff">
    <div class="title">
      <div class="container">
        <p>Lo</p>
        <h1 class="bold-border">Nuestro</h1>
      </div>
    </div>
  </div>

  <div class="clients-container">
    <div class="title">
      <h1 class="bold-border">Quiénes</h1>
      <h2>Han estado</h2>
      <p>con nosotros</p>
    </div>
    <simian-clients limit="12"></simian-clients>
    <div class="see-more">
      <a ui-sref="clients" class="button">Ver más</a>
    </div>
  </div>

  <div class="we-are">
    <div class="title">
      <h1 class="bold-border">Quiénes</h1>
      <p>somos</p>
    </div>
    <div class="monkeys">

      <div class="bosses">
        <div class="monkey" ng-repeat="boss in bosses">
          <div class="image-container">
            <img ng-src="{{boss.avatar}}" alt="{{boss.name}}">
            <a href="" class="more-link"></a>
          </div>
          <h1>{{boss.name}}</h1>
          <p>{{boss.position}}</p>
        </div>
      </div>

      <div class="simians grid">
        <div class="monkey item" ng-repeat="simian in simians">
          <div class="image-container">
            <img ng-src="{{simian.avatar}}" alt="{{simian.name}}">
            <a href="" class="more-link"></a>
          </div>
          <h1>{{simian.name}}</h1>
          <p>{{simian.position}}</p>
        </div>
      </div>

    </div>
  </div>

  <div class="find-us">
    <div class="sign">
      <img src="../img/home/find-us-sign.svg" alt="">
      <div class="sign-text">
        <h1 class="bold-border">Donde</h1>
        <p>encontrarnos</p>
      </div>
    </div>
    <div class="see-more">
      <p>Nuestra filosofía es el trabajo en forma remota.</p>
      <a ui-sref="location" class="button">Ver más</a>
    </div>
  </div>
</div>
