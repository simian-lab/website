<footer class="footer-{{$root.activeSection}}">
  <div class="background-section" ng-show="$root.activeSection != 'we-are' &&  $root.activeSection !='quienes-somos'" >
    <div class="footer-title">
      <h1>Podemos hablar</h1>
      <div class="linea"></div>
    </div>

    <div class="footer-content" >
      <form class="contact-form" name="contact">
        <div class="form-group">
          <input id="name" ng-disabled="contact.isSend" type="text" ng-model="contact.value.Name">
          <label for="name">*Nombre</label>
        </div>
        <div class="form-group">
          <input id="email" ng-disabled="contact.isSend" type="email" ng-model="contact.value.Email" >
          <label for="email">*Correo electrónico</label>
        </div>
        <div class="form-group">
          <input id="number" ng-disabled="contact.isSend" type="number" ng-model="contact.value.Number">
          <label for="number">Número de contacto</label>
        </div>
        <div class="form-group">
          <textarea id="mesg" ng-disabled="contact.isSend" cols="30" rows="10" ng-model="contact.value.Message"></textarea>
          <label for="mesg">*Mensaje</label>
        </div>

        <label>*Campo obligatorio</label><br>
        <input ng-disabled="contact.isSend" type="submit" class="button" value="Enviar">
      </form>

      <div class="line"></div>

      <div class="contact-info">

        <h1 class="info-title">Contacto</h1>

        <div class="info">
          <div class="field">
            <div class="field-content">
              <p><span class="field-text">Nuestro correo: </span><a href="mailto:info@simian.co">info@simian.co</a></p>
            </div>
          </div>

          <div class="field">
            <div class="field-content">
              <p><span class="field-text">Nuestro número: </span><a href="tel:+573115678904">311 5678904</a></p>
            </div>
          </div>

          <div class="sociales field">
            <div class="field-content social">
              <p>Encuéntranos en:</p>
              <ul class="social-icons">
                <li>
                  <a href="https://www.facebook.com/simianlab/" target="_blank">
                    <img src="../img/footer/icon-facebook.svg" alt="">
                  </a>
                </li>
                <li>
                  <a href="https://twitter.com/simianlab" target="_blank">
                    <img src="../img/footer/icon-twitter.svg" alt="">
                  </a>
                </li>
                <li>
                  <a href="https://www.youtube.com/user/SimianLab" target="_blank">
                    <img src="../img/footer/icon-youtube.svg" alt="">
                  </a>
                </li>
                <li>
                  <a href="https://www.linkedin.com/company/3550206" target="_blank">
                    <img src="../img/footer/icon-linkedin.svg" alt="">
                  </a>
                </li>
              </ul>
            </div>
          </div>

          <div class="field">
            <div class="field-content">
              <p>Aliados:</p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="footer-end">
    <img src="../img/footer/banano-footer.svg" alt="">
    <p>© 2016 Simian</p>
  </div>
</footer>
