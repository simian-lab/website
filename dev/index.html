<!DOCTYPE html>
<html ng-app="simian">
  <head>
    <base href="/">
    <title>Simian</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#3F3832">

    <!-- build:styles /styles/styles.css -->
    <link rel="stylesheet" href="/css/reset.css">

    <link rel="stylesheet" href="/bower_components/Swiper/dist/css/swiper.css">

    <link rel="stylesheet" href="/css/styles.css">
    <!-- endbuild -->

    <!--Robots-->
    <meta name="robots" content="index, follow">

    <!--Twitter data-->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@simianlab">
    <meta name="twitter:title" content="Simian – Web and mobile design & development studio">
    <meta name="twitter:description" content="Need help with an app or website? Wether you have a big project or a simple idea, Simian can help!">
    <meta name="twitter:image:src" content="http://simian.co/images/monkeyface.png">

  </head>
  <body ng-controller="AppController">

    <simian-header></simian-header>

    <div class="main-content section-{{activeSection}}">
      <div ui-view></div>
    </div>

    <simian-footer></simian-footer>

    <!-- build:scripts /scripts/scripts.js -->
    <script src="/bower_components/angular/angular.js"></script>

    <script src="/bower_components/angular-ui-router/release/angular-ui-router.js"></script>
    <script src="/bower_components/angular-translate/angular-translate.js"></script>
    <script src="/bower_components/Swiper/dist/js/swiper.js"></script>

    <script src="/js/app.js"></script>

    <script src="/modules/header/header.js"></script>
    <script src="/modules/footer/footer.js"></script>
    <script src="/modules/home/home.js"></script>
    <script src="/modules/we-do/we-do.js"></script>
    <script src="/modules/projects/projects.js"></script>
    <script src="/modules/clients/clients.js"></script>
    <script src="/modules/we-are/we-are.js"></script>
    <script src="/modules/location/location.js"></script>
    <script src="/modules/we-share/we-share.js"></script>
    <script src="/modules/monkeys/monkeys.js"></script>
    <!-- endbuild -->
  </body>
</html>
