language: node_js

node_js:
 - 4.2.3

build:
  pre_ci_boot:
    image_name: drydock/u14nodall
    image_tag: prod
    pull: true

script:
  - mocha

after_success:
  - if [ $BRANCH == "develop" ]; then git push -f git@heroku.com:beta-simian.git $BRANCH:master; fi
  - if [ $BRANCH == "master" ]; then git push -f git@heroku.com:simian-website.git $BRANCH:master; fi

# include
branches:
  only:
    - master
    - develop

cache: true
